<!DOCTYPE html>
<html>
<head>
    <title> Resume Analyzer</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            width: 400px;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input[type="file"] {
            margin: 20px 0;
        }

        button {
            background: #4facfe;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #00c6ff;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>AI Resume Classifier</h2>

    <form action="/predict" method="post" enctype="multipart/form-data">
        <input type="file" name="resume" required>
        <br>
        <button type="submit"> Analyze Resume</button>
    </form>
</div>

</body>
</html>
